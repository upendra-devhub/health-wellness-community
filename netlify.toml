[build]
command = "npm run vercel-build"
functions = "api"

[dev]
command = "vercel dev"
port = 3000

[[redirects]]
from = "/*"
to = "/api/index.js"
status = 200

[headers]
[[headers.headers]]
key = "Content-Type"
value = "application/json"

[[headers.headers]]
key = "Cache-Control"
value = "public, max-age=31536000"
for = "/*.{js,css,png,jpg,jpeg,gif,svg,woff,woff2,ttf,eot}"
